name: Desktop Build and Release

on:
  pull_request:
    branches:
      - main
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to publish, for example v1.0.0'
        required: true
        default: 'v0.0.0'
      draft:
        description: 'Create the GitHub Release as a draft'
        required: true
        type: boolean
        default: true
      prerelease:
        description: 'Mark the GitHub Release as a prerelease'
        required: true
        type: boolean
        default: false

permissions:
  contents: read

env:
  APP_SLUG: sponzey-file-sharing

jobs:
  build-macos:
    name: Build macOS
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Resolve dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build macOS release
        run: flutter build macos --release

      - name: Package macOS artifact
        shell: bash
        run: |
          set -euo pipefail
          raw_version="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}"
          version="${raw_version//\//-}"
          mkdir -p dist
          app_dir="$(find build/macos/Build/Products/Release -maxdepth 1 -name '*.app' -type d | head -n 1)"
          if [[ -z "${app_dir}" ]]; then
            echo "No macOS .app bundle found."
            exit 1
          fi
          ditto -c -k --sequesterRsrc --keepParent "${app_dir}" "dist/${APP_SLUG}-macos-${version}.zip"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: dist/*.zip
          if-no-files-found: error

  build-windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Build Windows release
        shell: pwsh
        run: scripts\build_windows.ps1

      - name: Package Windows artifact
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $rawVersion = "${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}"
          $version = $rawVersion -replace '[\\/:*?"<>|]', '-'
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $releaseDir = "build\windows\x64\runner\Release"
          if (-not (Test-Path $releaseDir)) {
            throw "Windows release output was not found: $releaseDir"
          }
          Compress-Archive -Path "$releaseDir\*" -DestinationPath "dist\$env:APP_SLUG-windows-$version.zip" -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: dist/*.zip
          if-no-files-found: error

  build-linux:
    name: Build Linux
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            ninja-build \
            pkg-config \
            libgtk-3-dev \
            liblzma-dev \
            libsecret-1-dev

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Resolve dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build Linux release
        run: flutter build linux --release

      - name: Package Linux artifact
        shell: bash
        run: |
          set -euo pipefail
          raw_version="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}"
          version="${raw_version//\//-}"
          mkdir -p dist
          bundle_dir="build/linux/x64/release/bundle"
          if [[ ! -d "${bundle_dir}" ]]; then
            echo "Linux release output was not found: ${bundle_dir}"
            exit 1
          fi
          tar -czf "dist/${APP_SLUG}-linux-${version}.tar.gz" -C "build/linux/x64/release" bundle

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: dist/*.tar.gz
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    needs:
      - build-macos
      - build-windows
      - build-linux
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}
          target_commitish: ${{ github.sha }}
          name: Sponzey FileSharing ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}
          draft: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.draft == 'true' || false }}
          prerelease: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.prerelease == 'true' || contains(github.ref_name, '-') }}
          files: dist/*
          fail_on_unmatched_files: true
          generate_release_notes: true
